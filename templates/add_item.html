<!DOCTYPE html>
<html lang="en">
<head>
<title>Add Item - Cloud Kitchen Billing System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
    --bg-start: #090b11;
    --bg-end: #141723;
    --panel: rgba(12, 12, 14, 0.94);
    --panel-border: rgba(255,179,71,0.24);
    --accent: #FFB347;
    --accent-soft: rgba(255,179,71,0.08);
    --accent-strong: #ffcb70;
    --muted: #c7c7c7;
    --text: #f7f7f7;
    --danger: #d6333a;
    --danger-hover: #b02a37;
}
body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at top, rgba(255,179,71,0.14), transparent 28%), linear-gradient(135deg, var(--bg-start), var(--bg-end));
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: var(--text);
}
.card {
    width: min(520px, 92vw);
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 24px;
    box-shadow: 0 30px 70px rgba(0,0,0,0.4);
    padding: 2rem;
}
.page-title {
    text-align: center;
    margin-bottom: 1.5rem;
}
.page-title h2 {
    color: var(--accent);
    margin-bottom: 0.5rem;
}
.page-title p {
    color: var(--muted);
    margin: 0;
}
.form-control {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,179,71,0.25);
    border-radius: 14px;
    color: var(--text) !important;
    padding: 1rem;
}
.form-control:focus {
    outline: none;
    border-color: var(--accent-strong);
    box-shadow: 0 0 0 0.2rem rgba(255,179,71,0.18);
    background: rgba(255,255,255,0.12);
    color: var(--text) !important;
}
.form-control::placeholder {
    color: var(--muted) !important;
}
.form-label {
    color: var(--accent);
    font-weight: 600;
}
.btn {
    border-radius: 999px;
    border: none;
    padding: 0.95rem 1.5rem;
    font-weight: 700;
    color: black;
}
.btn-primary {
    background: var(--accent);
}
.btn-success {
    background: #28a745;
    color: white;
}
.btn-primary:hover {
    background: var(--accent-strong);
}
.btn-success:hover {
    background: #218838;
}
.btn-secondary {
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid var(--panel-border);
}
.btn-secondary:hover {
    background: rgba(255,179,71,0.2);
}
.btn-danger {
    background: var(--danger);
    color: white;
}
.btn-danger:hover {
    background: var(--danger-hover);
}
.text-muted {
    color: var(--muted) !important;
}
</style>
</head>
<body>
<div class="card">
    <div class="page-title">
        <i class="fas fa-plus-circle" style="font-size: 3rem; color: #FFB347;"></i>
        <h2>Add Menu Item</h2>
        <p>Keep your kitchen stocked with fresh items.</p>
    </div>
    <form method="POST">
        <div class="mb-4">
            <label class="form-label mb-2">Item Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter item name (e.g., Chicken Biryani)" required>
        </div>
        <div class="mb-4">
            <label class="form-label mb-2">Price (₹)</label>
            <input type="number" step="0.01" name="price" class="form-control" placeholder="Enter price (e.g., 150.00)" required>
        </div>
        <div class="d-flex gap-3 flex-column flex-sm-row">
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-plus me-2"></i>Add Item
            </button>
            <a href="/" class="btn btn-secondary w-100">
                <i class="fas fa-arrow-left me-2"></i>Cancel
            </a>
        </div>
    </form>
</div>
</body>
</html>
