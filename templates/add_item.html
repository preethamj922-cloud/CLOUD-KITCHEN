{% extends "base.html" %}
{% block title %}Add Item — Cloud Kitchen{% endblock %}

{% block content %}
<div class="container" style="max-width: 520px;">
  <div class="page-header">
    <h1>Add Menu Item</h1>
    <p>New dish or drink to your kitchen menu</p>
  </div>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Item Name</label>
        <input type="text" name="name" placeholder="e.g. Butter Chicken, Masala Dosa" required>
      </div>
      <div class="form-group">
        <label>Price (₹)</label>
        <input type="number" name="price" placeholder="e.g. 180" step="0.01" min="0" required>
      </div>
      <div style="display:flex; gap: 0.75rem; margin-top:0.5rem;">
        <button type="submit" class="btn btn-primary">Add to Menu</button>
        <a href="/" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
